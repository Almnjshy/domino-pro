name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create fresh React Native project
        run: |
          npx @react-native-community/cli@12 init DominoPro --version 0.73.0

      - name: Configure native modules
        run: |
          # إنشاء ملفات صوتية فارغة
          mkdir -p DominoPro/android/app/src/main/res/raw
          for sound in button_click domino_place win lose draw music_classic music_modern; do
            dd if=/dev/zero of=DominoPro/android/app/src/main/res/raw/${sound}.mp3 bs=1024 count=1 2>/dev/null
          done
          
          # تعديل MainApplication.java
          MAIN_APP="DominoPro/android/app/src/main/java/com/dominopro/MainApplication.java"
          
          # إضافة imports
          sed -i '/import com.facebook.react.ReactApplication;/a \
          import com.swmansion.reanimated.ReanimatedPackage;\
          import com.swmansion.gesturehandler.react.RNGestureHandlerPackage;\
          import com.horcrux.svg.SvgPackage;\
          import com.reactnativecommunity.asyncstorage.AsyncStoragePackage;\
          import com.zmxv.RNSound.RNSoundPackage;' $MAIN_APP
          
          # إضافة packages في getPackages()
          sed -i '/new MainReactPackage()/a \
          , new ReanimatedPackage()\
          , new RNGestureHandlerPackage()\
          , new SvgPackage()\
          , new AsyncStoragePackage()\
          , new RNSoundPackage()' $MAIN_APP

      - name: Copy our source code
        run: |
          cp -r src DominoPro/
          cp index.js DominoPro/ 2>/dev/null || true
          cp App.tsx DominoPro/ 2>/dev/null || true
          cp App.js DominoPro/ 2>/dev/null || true

      - name: Install additional dependencies
        run: |
          cd DominoPro
          npm install react-native-svg@15.0.0
          npm install react-native-reanimated@3.6.0
          npm install react-native-gesture-handler@2.14.0
          npm install react-native-sound@0.11.2
          npm install @react-native-async-storage/async-storage@1.21.0

      - name: Bundle JS
        run: |
          cd DominoPro
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/

      - name: Build Release APK
        run: |
          cd DominoPro/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: domino-pro-release
          path: DominoPro/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30