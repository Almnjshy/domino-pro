name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create fresh React Native project
        run: |
          npx @react-native-community/cli@12 init DominoPro --version 0.73.0
          
      - name: Optimize build.gradle for smaller APK
        run: |
          cat > DominoPro/android/app/build.gradle << 'EOF'
apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.dominopro"
    defaultConfig {
        applicationId "com.almnjshy.dominopro"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }
    
    splits {
        abi {
            reset()
            enable true
            universalApk true
            include "armeabi-v7a", "arm64-v8a"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
EOF

      - name: Create proguard-rules.pro
        run: |
          touch DominoPro/android/app/proguard-rules.pro

      - name: Copy our source code
        run: |
          # انسخ ملفات المشروع
          cp -r src DominoPro/
          cp index.js DominoPro/ 2>/dev/null || true
          cp App.tsx DominoPro/ 2>/dev/null || true
          cp App.js DominoPro/ 2>/dev/null || true
          
      - name: Install additional dependencies
        run: |
          cd DominoPro
          npm install react-native-svg@15.0.0
          npm install react-native-reanimated@3.6.0
          npm install react-native-gesture-handler@2.14.0
          npm install react-native-sound@0.11.2
          npm install @react-native-async-storage/async-storage@1.21.0
          
      - name: Bundle JS
        run: |
          cd DominoPro
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/
          
      - name: Build Release APK
        run: |
          cd DominoPro/android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: domino-pro-release
          path: DominoPro/android/app/build/outputs/apk/release/app-release-universal.apk
          retention-days: 30